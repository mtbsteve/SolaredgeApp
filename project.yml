name: SolaredgeApp
options:
  bundleIdPrefix: com.mtbsteve.solaredge
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  # ---------- iOS companion (setup only) ----------
  SolaredgeApp:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtbsteve.solaredge
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Solaredge"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: iOS/SolaredgeApp.entitlements
    dependencies:
      - target: SolaredgeWatch
        embed: true

  # ---------- watchOS app ----------
  SolaredgeWatch:
    type: application
    platform: watchOS
    sources:
      - path: Watch
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtbsteve.solaredge.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Solaredge"
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.mtbsteve.solaredge
        INFOPLIST_KEY_WKWatchOnly: NO
        INFOPLIST_KEY_WKBackgroundModes: remote-notification
        INFOPLIST_KEY_WKBackgroundTaskIdentifiers: solaredge.refresh
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_ENTITLEMENTS: Watch/SolaredgeWatch.entitlements
    dependencies:
      - target: SolaredgeWidgets
        embed: true

  # ---------- watchOS widgets / complications ----------
  SolaredgeWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: Widgets
      - path: Shared
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: "Solaredge Widgets"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mtbsteve.solaredge.watchkitapp.widgets
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_ENTITLEMENTS: Widgets/SolaredgeWidgets.entitlements
